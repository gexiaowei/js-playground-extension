name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Debug package manager inputs
        run: |
          node --version
          pnpm --version
          sed -n '1,24p' pnpm-lock.yaml
          grep -nE '^(lockfileVersion:|importers:|packages:|snapshots:|---|\.\.\.)$' pnpm-lock.yaml || true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Chrome extension private key
        env:
          CHROME_EXTENSION_PRIVATE_KEY_B64: ${{ secrets.CHROME_EXTENSION_PRIVATE_KEY_B64 }}
        run: |
          test -n "$CHROME_EXTENSION_PRIVATE_KEY_B64"
          mkdir -p .keys
          printf '%s' "$CHROME_EXTENSION_PRIVATE_KEY_B64" | base64 --decode > .keys/key.pem

      - name: Run lint
        run: pnpm lint

      - name: Build extension
        run: pnpm build:crx

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: javascript-playground-${{ github.sha }}
          path: |
            dist/javascript-playground.crx
            dist/javascript-playground.zip
            dist/updates.xml
          if-no-files-found: error

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/javascript-playground.crx
            dist/javascript-playground.zip
            dist/updates.xml
          fail_on_unmatched_files: true
